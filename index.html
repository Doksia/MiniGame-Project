<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Last Ligth</title>
  </head>
  <body>
    <main>
      
      <div id="game-intro">
        <img src="./images/logo.png" alt="" class="logo-img" />
        <br />
        <button id="start-button">Start Game</button>
        <p>Use the arrows to move the crosshair and the "Space" key to shoot to your enemies!</p>
        <img id="arrows" src="./images/arrows.png" alt="" class="arrows-img" />
      </div>
      <div id="space">
        <img src="./images/spaceBar.png" alt="" class="space-bar-img" />
      </div>

      <div id="game-container">
        <div>
          <h2>Stats</h2>
          <p>Score: <span id="score">0</span></p>
          <p>Lives: <span id="lives">3</span></p>
        </div>
        
        <div id="game-screen"></div>
      </div>

      
      <div id="game-end">
        <img src="./images/logo.png" alt="" class="logo-img" />
        <h1>Game Over</h1>
        <br />
        <button id="restart-button">Restart</button>
      </div>
    </main>

    <script type="text/javascript" src="js/bullet.js"></script>
    <script type="text/javascript" src="js/crosshair.js"></script>
    <script type="text/javascript" src="js/enemy.js"></script>
    <script type="text/javascript" src="js/game.js"></script>
    <script type="text/javascript" src="js/player.js"></script>
    <script type="text/javascript" src="js/script.js"></script>
  </body>
</html>
